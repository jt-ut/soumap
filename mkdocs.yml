site_name: soumap
site_description: Self-Organizing UMAP — hybrid SOM / UMAP learning of data prototypes and their low-dimensional embedding.
repo_url: https://github.com/jt-ut/soumap
repo_name: jt-ut/soumap

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
  - mkdocs-jupyter:
      execute: false

nav:
  - Home: index.md
  - Tutorial: soumap_mpec_tutorial.ipynb
  - API Reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
